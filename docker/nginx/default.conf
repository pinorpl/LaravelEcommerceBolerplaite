##
## Nginx — Ecommerce Boilerplate
## Security-hardened configuration
##

upstream php_fpm {
    server php:9000;
}

upstream nextjs_dev {
    server nextjs:3000;
}

# ── Rate limiting zones ────────────────────────────────────────────────────────
# [SEC] Limit auth endpoints to prevent brute force
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    # ── Security headers ───────────────────────────────────────────────────────
    # [SEC] Prevent clickjacking
    add_header X-Frame-Options "DENY" always;
    # [SEC] Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # [SEC] Basic XSS filter for older browsers
    add_header X-XSS-Protection "1; mode=block" always;
    # [SEC] Control referrer info sent to third parties
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # [SEC] Restrict browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # [SEC] Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://picsum.photos; connect-src 'self'; font-src 'self'; frame-ancestors 'none';" always;
    # [SEC] Enable HSTS — uncomment in production with valid TLS
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # [SEC] Hide Nginx version
    server_tokens off;

    # ── Rate-limited auth endpoints ────────────────────────────────────────────
    location ~ ^/api/(login|register|oauth)$ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/oauth/token$ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Laravel API & OAuth ────────────────────────────────────────────────────
    location ~ ^/(api|oauth)(/|$) {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM handler ───────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass php_fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        # [SEC] Prevent path traversal via SCRIPT_NAME
        fastcgi_param PHP_VALUE "open_basedir=/var/www/html";
    }

    # ── Next.js ────────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://nextjs_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Static assets ──────────────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        try_files $uri @nextjs_static;
        expires 1d;
        add_header Cache-Control "public";
    }

    location @nextjs_static {
        proxy_pass http://nextjs_dev;
        proxy_set_header Host $host;
    }

    # [SEC] Deny hidden files (.env, .git, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    # [SEC] Block common attack patterns
    location ~* \.(env|bak|sql|log|sh|conf)$ {
        deny all;
        return 404;
    }

    charset utf-8;
    client_max_body_size 64M;
}
